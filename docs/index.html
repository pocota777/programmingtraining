<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <title>SUSHIVADER</title>

  <style>
    body {
      margin: 0;
      background: #111;
      overflow: hidden;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    canvas {
      background: black;
      width: 100vw;
      height: 100vh;
      touch-action: none;
    }
  </style>
</head>

<body>

  <canvas id="game" width="400" height="800"></canvas>

  <script>
    const canvas = document.getElementById("game");
    const ctx = canvas.getContext("2d");

    // =========================
    // AUDIO FIX
    // =========================

    let audioCtx = null;
    let audioUnlocked = false;
    let bgmStarted = false;

    async function initAudio() {
      try {
        if (!audioCtx) {
          audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        }

        if (audioCtx.state === "suspended") {
          await audioCtx.resume();
        }

        console.log("Audio State:", audioCtx.state);

      } catch (e) {
        console.error("Audio init error:", e);
      }
    }

    // iPhone Safari unlock用
    async function unlockAudio() {

      await initAudio();

      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();

      osc.type = "sine";
      osc.frequency.value = 440;

      // 超小さい音
      gain.gain.value = 0.001;

      osc.connect(gain);
      gain.connect(audioCtx.destination);

      osc.start();
      osc.stop(audioCtx.currentTime + 0.05);
    }

    async function firstInteraction() {

      if (audioUnlocked) return;

      audioUnlocked = true;

      await unlockAudio();

      startBGM();
    }

    window.addEventListener("touchstart", firstInteraction, { passive: true });
    window.addEventListener("mousedown", firstInteraction, { passive: true });
    window.addEventListener("click", firstInteraction, { passive: true });

    // =========================
    // GAME
    // =========================

    let player = {
      x: 200,
      y: 700,
      speed: 8
    };

    let bullets = [];
    let enemies = [];
    let enemyBullets = [];

    let touching = false;
    let touchX = 200;

    let frame = 0;

    // =========================
    // SOUNDS
    // =========================

    async function playHitSound() {

      if (!audioCtx) return;

      if (audioCtx.state === "suspended") {
        await audioCtx.resume();
      }

      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();

      osc.type = "square";

      osc.frequency.setValueAtTime(220, audioCtx.currentTime);
      osc.frequency.exponentialRampToValueAtTime(
        80,
        audioCtx.currentTime + 0.1
      );

      gain.gain.setValueAtTime(0.12, audioCtx.currentTime);

      gain.gain.exponentialRampToValueAtTime(
        0.001,
        audioCtx.currentTime + 0.1
      );

      osc.connect(gain);
      gain.connect(audioCtx.destination);

      osc.start();
      osc.stop(audioCtx.currentTime + 0.1);
    }

    async function playDamageSound() {

      if (!audioCtx) return;

      if (audioCtx.state === "suspended") {
        await audioCtx.resume();
      }

      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();

      osc.type = "sawtooth";

      osc.frequency.setValueAtTime(120, audioCtx.currentTime);
      osc.frequency.exponentialRampToValueAtTime(
        40,
        audioCtx.currentTime + 0.25
      );

      gain.gain.setValueAtTime(0.18, audioCtx.currentTime);

      gain.gain.exponentialRampToValueAtTime(
        0.001,
        audioCtx.currentTime + 0.25
      );

      osc.connect(gain);
      gain.connect(audioCtx.destination);

      osc.start();
      osc.stop(audioCtx.currentTime + 0.25);
    }

    // =========================
    // BGM
    // =========================

    function startBGM() {

      if (bgmStarted) return;

      bgmStarted = true;

      const notes = [
        196.00,
        220.00,
        261.63,
        293.66,
        329.63
      ];

      let noteIndex = 0;

      function loopBGM() {

        if (!audioCtx) {
          setTimeout(loopBGM, 500);
          return;
        }

        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();

        osc.type = "triangle";

        osc.frequency.value = notes[noteIndex];

        gain.gain.setValueAtTime(
          0.001,
          audioCtx.currentTime
        );

        gain.gain.linearRampToValueAtTime(
          0.05,
          audioCtx.currentTime + 0.05
        );

        gain.gain.exponentialRampToValueAtTime(
          0.001,
          audioCtx.currentTime + 0.8
        );

        osc.connect(gain);
        gain.connect(audioCtx.destination);

        osc.start();
        osc.stop(audioCtx.currentTime + 0.8);

        noteIndex++;
        noteIndex %= notes.length;

        setTimeout(loopBGM, 500);
      }

      loopBGM();
    }

    // =========================
    // ENEMIES
    // =========================

    function spawnEnemy() {

      enemies.push({
        x: Math.random() * 360 + 20,
        y: -30,
        speed: 2 + Math.random() * 2
      });
    }

    setInterval(spawnEnemy, 1000);

    // =========================
    // TOUCH
    // =========================

    canvas.addEventListener("touchstart", e => {

      touching = true;

      const rect = canvas.getBoundingClientRect();

      touchX =
        (e.touches[0].clientX - rect.left)
        * (canvas.width / rect.width);

    }, { passive: false });

    canvas.addEventListener("touchmove", e => {

      const rect = canvas.getBoundingClientRect();

      touchX =
        (e.touches[0].clientX - rect.left)
        * (canvas.width / rect.width);

    }, { passive: false });

    canvas.addEventListener("touchend", () => {
      touching = false;
    });

    // PC
    window.addEventListener("mousemove", e => {

      const rect = canvas.getBoundingClientRect();

      touchX =
        (e.clientX - rect.left)
        * (canvas.width / rect.width);
    });

    // =========================
    // UPDATE
    // =========================

    function update() {

      frame++;

      // player move
      player.x += (touchX - player.x) * 0.3;

      // auto fire
      if (touching && frame % 5 === 0) {

        bullets.push({
          x: player.x,
          y: player.y
        });
      }

      // bullets
      bullets.forEach(b => {
        b.y -= 10;
      });

      bullets = bullets.filter(b => b.y > -20);

      // enemies
      enemies.forEach(e => {
        e.y += e.speed;
      });

      enemies = enemies.filter(e => e.y < 900);

      // hit
      bullets.forEach((b, bi) => {

        enemies.forEach((e, ei) => {

          if (
            Math.abs(b.x - e.x) < 30 &&
            Math.abs(b.y - e.y) < 30
          ) {

            bullets.splice(bi, 1);
            enemies.splice(ei, 1);

            playHitSound();
          }
        });
      });
    }

    // =========================
    // DRAW
    // =========================

    function draw() {

      ctx.clearRect(0, 0, canvas.width, canvas.height);

      // player
      ctx.fillStyle = "cyan";

      ctx.fillRect(
        player.x - 20,
        player.y - 20,
        40,
        40
      );

      // bullets
      ctx.fillStyle = "yellow";

      bullets.forEach(b => {

        ctx.fillRect(
          b.x - 3,
          b.y - 10,
          6,
          20
        );
      });

      // enemies
      ctx.fillStyle = "red";

      enemies.forEach(e => {

        ctx.fillRect(
          e.x - 20,
          e.y - 20,
          40,
          40
        );
      });
    }

    // =========================
    // LOOP
    // =========================

    function loop() {

      update();

      draw();

      requestAnimationFrame(loop);
    }

    loop();

  </script>

</body>

</html>
