<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <title>INVADER（やさしめ版）</title>
  <style>
    body {
      margin: 0;
      background: #111;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      font-family: sans-serif;
      padding: 20px;
      box-sizing: border-box;
    }
    #game-container {
      position: relative;
      width: 400px;
      height: 800px;
      background: #000;
      box-shadow: 0 0 50px rgba(0,0,0,0.5);
      flex-shrink: 0;
    }
    canvas {
      width: 400px;
      height: 800px;
      display: block;
      touch-action: none;
    }

    #msg {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: #fff;
      text-align: center;
      font-size: 36px;
      font-weight: 900;
      text-shadow: 0 0 10px rgba(0,0,0,0.8), 0 0 20px rgba(0,0,0,0.8);
      background: rgba(0, 0, 0, 0.7);
      padding: 20px 40px;
      border-radius: 10px;
      border: 2px solid #fff;
      pointer-events: none;
      z-index: 100;
      white-space: nowrap;
    }
    #msg span {
      display: block;
      font-size: 18px;
      margin-top: 10px;
      color: #ffcc00;
    }
  </style>
</head>

<body>

  <div id="game-container">
    <canvas id="game" width="400" height="800"></canvas>
    <div id="msg" class="screen"></div>
  </div>

  <script>
    const canvas = document.getElementById("game");
    const ctx = canvas.getContext("2d");

    const bgImg = new Image();
    bgImg.src = "bg.png";

    // アイコン（絵文字を使用）
    const emojis = {
      chef: "🧑‍🍳",
      sushi: "🍣",
      money: "💴",
      bunny: "👯‍♀️"
    };

    let player, bullets, enemyBullets, enemies, boss;
    let keys = {};
    let stage = 1, score = 0;
    let playing = false, waiting = true;
    let enemyDir = 1;
    let shake = 0;

    // サウンド設定 (Web Audio API)
    let audioCtx = null;
    let bgmOsc = null;

    function initAudio() {
      if (audioCtx) return;
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }

    function playHitSound() {
      if (!audioCtx) return;
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.type = "square";
      osc.frequency.setValueAtTime(150, audioCtx.currentTime);
      osc.frequency.exponentialRampToValueAtTime(40, audioCtx.currentTime + 0.1);
      gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
      gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.1);
      osc.connect(gain);
      gain.connect(audioCtx.destination);
      osc.start();
      osc.stop(audioCtx.currentTime + 0.1);
    }

    function playDamageSound() {
      if (!audioCtx) return;
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.type = "sawtooth";
      osc.frequency.setValueAtTime(100, audioCtx.currentTime);
      osc.frequency.exponentialRampToValueAtTime(20, audioCtx.currentTime + 0.3);
      gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
      gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.3);
      osc.connect(gain);
      gain.connect(audioCtx.destination);
      osc.start();
      osc.stop(audioCtx.currentTime + 0.3);
    }

    function startBGM() {
      if (!audioCtx || bgmOsc) return;
      bgmOsc = true; // 重複防止
      const notes = [196.00, 220.00, 261.63, 293.66, 329.63]; // 少し低めのペンタトニック
      let noteIdx = 0;

      function playNextNote() {
        if (!playing) {
          setTimeout(playNextNote, 1000);
          return;
        }
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = "sine"; // より柔らかい音
        osc.frequency.setValueAtTime(notes[noteIdx], audioCtx.currentTime);
        
        gain.gain.setValueAtTime(0, audioCtx.currentTime);
        gain.gain.linearRampToValueAtTime(0.02, audioCtx.currentTime + 0.1); // 柔らかいアタック
        gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 1.5);
        
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.start();
        osc.stop(audioCtx.currentTime + 2.0);
        
        noteIdx = (noteIdx + 1) % notes.length;
        // テンポを遅くし、ランダムな間隔を少し入れることで「落ち着き」を出す
        setTimeout(playNextNote, 1200 + Math.random() * 800);
      }
      playNextNote();
    }

    // 初期化
    function initStage() {
      if (stage === 1) {
        player = { x: 180, y: 590, w: 40, h: 20, speed: 8, life: 5 };
      } else {
        player.x = 180;
        player.y = 590;
      }
      shake = 0;

      bullets = [];
      enemyBullets = [];
      enemies = [];
      boss = null;

      if (stage < 4) {
        for (let y = 0; y < 2 + stage; y++) {
          for (let x = 0; x < 6; x++) {
            enemies.push({
              x: 40 + x * 50,
              y: 260 + y * 50, // 下にずらした
              type: y
            });
          }
        }
      } else {
        boss = { x: 140, y: 260, hp: 20, maxHp: 20, vx: 1.5 };
      }
    }

    // ステージ表示
    function showStage() {
      initStage();
      playing = false;
      waiting = true;

      // メッセージ更新
      const msgEl = document.getElementById("msg");
      if (stage < 4) {
        msgEl.innerHTML = `STAGE ${stage}<br><span>TAP or SPACEで開始</span>`;
        msgEl.style.color = "white";
      } else {
        msgEl.innerHTML = `FINAL STAGE<br><span>TAP or SPACEで最終決戦</span>`;
        msgEl.style.color = "#ff3300"; // ボス戦は赤
        msgEl.style.borderColor = "#ff3300";
      }
      msgEl.style.display = "block";
    }

    // 入力
    window.addEventListener("keydown", e => { 
      keys[e.code] = true; 
      initAudio(); // キー操作でも開始
      startBGM();
    });
    window.addEventListener("keyup", e => {
      if (e.code === "Space") {
        if (waiting) {
          waiting = false;
          playing = true;
          document.getElementById("msg").style.display = "none";
          return;
        }
        if (playing) {
          bullets.push({ x: player.x + 10, y: player.y });
        }
      }
      keys[e.code] = false;
    });

    // タッチ・クリック入力 (レスポンシブ対応)
    function handlePointer(e) {
      initAudio(); // ユーザー操作でオーディオ開始
      startBGM();

      if (!playing && waiting) {
        waiting = false;
        playing = true;
        document.getElementById("msg").style.display = "none";
        return;
      }
      
      const rect = canvas.getBoundingClientRect();
      const clientX = e.touches ? e.touches[0].clientX : e.clientX;
      const x = (clientX - rect.left) * (canvas.width / rect.width);
      
      player.targetX = x; // ターゲット位置へ移動
      
      // 自動射撃 (タッチ中)
      if (playing && Math.random() < 0.2) {
        bullets.push({ x: player.x + 10, y: player.y });
      }
    }
    
    canvas.addEventListener("touchstart", e => { e.preventDefault(); handlePointer(e); }, { passive: false });
    canvas.addEventListener("touchmove", e => { e.preventDefault(); handlePointer(e); }, { passive: false });
    canvas.addEventListener("mousedown", e => { handlePointer(e); });
    window.addEventListener("mousemove", e => { if (e.buttons === 1) handlePointer(e); });

    // ヒット
    function hit() {
      shake = 8;
    }

    // 更新
    function update() {

      bullets = bullets.filter(b => b.y > 0);
      enemyBullets = enemyBullets.filter(b => b.y < 800);

      if (!playing) return;
      
      // 移動
      if (keys["ArrowLeft"]) player.x -= player.speed;
      if (keys["ArrowRight"]) player.x += player.speed;
      
      // タッチ追従
      if (player.targetX !== undefined) {
        const dx = player.targetX - player.x;
        if (Math.abs(dx) > player.speed) {
          player.x += Math.sign(dx) * player.speed;
        }
      }

      if (player.x < 0) player.x = 0;
      if (player.x > canvas.width - player.w) player.x = canvas.width - player.w;

      bullets.forEach(b => b.y -= 7);
      enemyBullets.forEach(b => b.y += 3);

      // 敵
      if (enemies.length) {
        let edge = false;
        enemies.forEach(e => {
          e.x += enemyDir * (0.7 + stage * 0.2);
          if (e.x < 10 || e.x > 360) edge = true;
        });
        if (edge) {
          enemyDir *= -1;
          enemies.forEach(e => e.y += 15);
        }

        enemies.forEach(e => {
          if (Math.random() < 0.001 + stage * 0.0005) {
            enemyBullets.push({ x: e.x + 10, y: e.y });
          }
        });
      }

      // ボス
      if (boss) {
        boss.x += boss.vx;
        if (boss.x < 0 || boss.x > 300) boss.vx *= -1;

        if (Math.random() < 0.015) {
          enemyBullets.push({ x: boss.x + 40, y: boss.y });
        }
      }

      // 自弾と敵の当たり判定
      bullets.forEach((b, bi) => {
        enemies.forEach((e, ei) => {
          if (b.x > e.x && b.x < e.x + 30 && b.y > e.y && b.y < e.y + 30) {
            enemies.splice(ei, 1);
            bullets.splice(bi, 1);
            score += 10;
            playHitSound(); // 当たり音
          }
        });

        if (boss && b.x > boss.x && b.x < boss.x + 80 && b.y > boss.y && b.y < boss.y + 80) {
          boss.hp -= 0.5;
          bullets.splice(bi, 1);
          score += 5;
          playHitSound(); // 当たり音
          shake = 10;
        }
      });

      // 被弾
      enemyBullets.forEach((b, bi) => {
        if (Math.abs(b.x - player.x) < 20 && Math.abs(b.y - player.y) < 20) {
          enemyBullets.splice(bi, 1);
          player.life--;
          playDamageSound(); // ダメージ音
          shake = 15;
          if (player.life <= 0) {
            playing = false;
            document.getElementById("msg").innerHTML = "GAME OVER";
          }
        }
      });

      // ステージ進行
      if (enemies.length === 0 && !boss) {
        stage++;
        showStage();
      }

      // ⭐ エンディング変更
      if (boss && boss.hp <= 0) {
        playing = false;
        shake = 0;
        const msgEl = document.getElementById("msg");
        msgEl.innerHTML = "MISSION COMPLETE";
        msgEl.style.color = "#ffff00";
        msgEl.style.borderColor = "#ffff00";
        msgEl.style.display = "block";
      }

      if (shake > 0) shake *= 0.9;
    }

    // 描画
    function draw() {
      ctx.save();

      if (shake > 0) {
        ctx.translate((Math.random() - 0.5) * shake, (Math.random() - 0.5) * shake);
      }

      ctx.clearRect(0, 0, 400, 800);

      // 背景 (全体を40px下にずらしてUIスペースを確保)
      // 上部 (板前)
      ctx.drawImage(bgImg, 0, 0, 1024, 350, 0, 40, 400, 200);
      // 中部 (テーブル)
      ctx.drawImage(bgImg, 0, 350, 1024, 300, 0, 240, 400, 400);
      // 下部 (客席)
      ctx.drawImage(bgImg, 0, 650, 1024, 374, 0, 640, 400, 200);

      ctx.globalAlpha = 1.0;

      // プレイヤー (👯‍♀️)
      ctx.font = "40px serif";
      ctx.fillText(emojis.bunny, player.x - 10, player.y + 30);

      // 弾 (💴 札束)
      ctx.font = "20px serif";
      bullets.forEach(b => {
        ctx.fillText(emojis.money, b.x - 10, b.y + 10);
      });

      // 敵弾 (🍣 寿司)
      enemyBullets.forEach(b => {
        ctx.fillText(emojis.sushi, b.x - 10, b.y + 10);
      });

      // 敵 (🧑‍🍳 寿司職人)
      ctx.font = "30px serif";
      enemies.forEach(e => {
        ctx.fillText(emojis.chef, e.x - 5, e.y + 15);
      });

      // ボス
      if (boss) {
        ctx.font = "80px serif";
        ctx.fillText(emojis.chef, boss.x - 10, boss.y + 40);
      }

      // UI (上部の黒い帯を広げる)
      ctx.fillStyle = "rgba(0,0,0,0.85)";
      ctx.fillRect(0, 0, 400, 80);

      // ボスHPバー (黒帯の上に描画 - 横並びレイアウト)
      if (boss) {
        ctx.font = "bold 16px sans-serif";
        ctx.fillStyle = "#ffff00";
        ctx.textAlign = "left";
        ctx.fillText("BOSS HP", 10, 65);

        const barX = 100, barY = 52, barW = 290, barH = 16;
        // ゲージの背景
        ctx.fillStyle = "#444";
        ctx.fillRect(barX, barY, barW, barH);
        // 赤いゲージ
        ctx.fillStyle = "#ff2222";
        ctx.fillRect(barX, barY, barW * (boss.hp / boss.maxHp), barH);
        // 枠線
        ctx.strokeStyle = "white";
        ctx.lineWidth = 2;
        ctx.strokeRect(barX, barY, barW, barH);

        // 数値表示 (バーの上に重ねるか、右端に)
        ctx.font = "bold 12px sans-serif";
        ctx.fillStyle = "white";
        ctx.textAlign = "center";
        ctx.fillText(Math.ceil(boss.hp) + " / " + boss.maxHp, barX + barW / 2, barY + 12);
        ctx.textAlign = "left";
      }

      ctx.font = "bold 22px sans-serif";
      ctx.fillStyle = "white";
      ctx.shadowColor = "black";
      ctx.shadowBlur = 4;

      ctx.textAlign = "left";
      ctx.fillText("LIFE: ", 10, 32);
      ctx.fillText("❤️".repeat(player.life), 75, 32);

      ctx.textAlign = "right";
      ctx.fillText("SCORE: " + score, 390, 32);

      ctx.shadowBlur = 0; // シャドウ解除
      ctx.textAlign = "left";

      ctx.restore();
    }

    // ループ
    function loop() {
      update();
      draw();
      requestAnimationFrame(loop);
    }

    // 初期
    showStage();
    loop();
  </script>

</body>

</html>
