<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>SUSHIVADER</title>

  <style>
    @font-face {
      font-family: "MisakiGothic";
      src: url("https://cdn.leafscape.be/misaki/misaki_gothic_web.woff2") format("woff2");
    }

    body {
      margin: 0;
      background: #111;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      font-family: "MisakiGothic", sans-serif;
      overflow: hidden;
      touch-action: none;
    }

    #game-container {
      position: relative;
      height: 95vh;
      height: 95dvh;
      aspect-ratio: 1 / 2;
      background: #000;
      box-shadow: 0 0 50px rgba(0, 0, 0, 0.5);
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
      max-width: 100vw;
      max-height: 100vh;
      max-height: 100dvh;
    }

    @media (max-width: 600px) {
      #game-container {
        height: 100vh;
        height: 100dvh;
        width: auto;
      }
    }

    canvas {
      width: 100%;
      height: 100%;
      display: block;
      object-fit: contain;
    }

    #msg-overlay {
      position: absolute;
      inset: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      background: rgba(0, 0, 0, 0.5);
      z-index: 100;
    }

    #msg-content {
      color: white;
      text-align: center;
      font-size: 28px;
      text-shadow: 0 0 10px #000;
      background: rgba(0, 0, 0, 0.85);
      padding: 20px;
      border: 4px solid white;
      border-radius: 10px;
      width: 80%;
      max-width: 320px;
    }

    #msg-content span {
      display: block;
      margin-top: 15px;
      font-size: 18px;
      color: #ffcc00;
    }

    #loading-screen {
      position: absolute;
      inset: 0;
      background: #000;
      z-index: 200;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      color: white;
    }

    #loading-bar-container {
      width: 240px;
      height: 24px;
      border: 3px solid white;
      background: #222;
      margin-top: 20px;
      padding: 2px;
      box-sizing: border-box;
    }

    #loading-bar {
      width: 0%;
      height: 100%;
      background: white;
      transition: width 0.1s;
    }
  </style>
</head>

<body>
  <div id="game-container">

    <canvas id="gameCanvas"></canvas>

    <div id="msg-overlay">
      <div id="msg-content">
        STAGE 1
        <br />
        <span>TAP or SPACEで開始</span>
      </div>
    </div>

    <div id="loading-screen">
      <div>LOADING...</div>

      <div id="loading-bar-container">
        <div id="loading-bar"></div>
      </div>

      <div id="loading-text" style="margin-top:10px">
        0%
      </div>
    </div>
  </div>

  <!-- iOS audio unlock -->
  <audio id="silent-audio" muted playsinline loop>
    <source src="data:audio/wav;base64,UklGRigAAABXQVZFRm10IBAAAAABAAEARKwAAIhYAQACABAAZGF0YQQAAAAAAA=="
      type="audio/wav" />
  </audio>

  <script>
    // =====================================================
    // 基本
    // =====================================================

    const canvas = document.getElementById("gameCanvas");
    const ctx = canvas.getContext("2d");

    const msgOverlay = document.getElementById("msg-overlay");
    const msgContent = document.getElementById("msg-content");

    const silentAudio = document.getElementById("silent-audio");

    canvas.width = 400;
    canvas.height = 800;

    // =====================================================
    // 画像
    // =====================================================

    const bgImg = new Image();
    const officeBgImg = new Image();

    const assets = {
      chef: new Image(),
      money: new Image(),
      bunny: new Image(),
      boss: new Image(),
      paper: new Image(),
      pc: new Image(),
      woman2: new Image(),
      life: new Image(),
    };

    const sushiAssets = [
      { img: new Image(), pts: 10, src: "egg.png" },
      { img: new Image(), pts: 20, src: "tuna.png" },
      { img: new Image(), pts: 30, src: "salmon.png" },
      { img: new Image(), pts: 40, src: "ikura.png" },
      { img: new Image(), pts: 50, src: "uni.png" },
    ];

    function loadAssets() {

      const allImages = [
        { img: bgImg, src: "images/sushibg.jpg" },
        { img: officeBgImg, src: "images/officebg.jpg" },

        { img: assets.chef, src: "images/itamae.png" },
        { img: assets.money, src: "images/money.png" },
        { img: assets.bunny, src: "images/woman1.png" },
        { img: assets.boss, src: "images/boss.png" },
        { img: assets.paper, src: "images/paper.png" },
        { img: assets.pc, src: "images/pc.png" },
        { img: assets.woman2, src: "images/woman2.png" },
        { img: assets.life, src: "images/life.png" },

        ...sushiAssets,
      ];

      let loaded = 0;

      allImages.forEach((item) => {

        item.img.onload = item.img.onerror = () => {

          loaded++;

          const percent = Math.floor(
            (loaded / allImages.length) * 100
          );

          document.getElementById("loading-bar").style.width =
            percent + "%";

          document.getElementById("loading-text").innerText =
            percent + "%";

          if (loaded === allImages.length) {

            setTimeout(() => {

              document.getElementById(
                "loading-screen"
              ).style.display = "none";

              showStage();

              loop();

            }, 500);
          }
        };

        item.img.src = item.src;
      });
    }

    loadAssets();

    // =====================================================
    // 描画
    // =====================================================

    function drawSprite(img, x, y, targetWidth) {

      if (!img.complete || !img.naturalWidth) return;

      const ratio = img.naturalHeight / img.naturalWidth;
      const targetHeight = targetWidth * ratio;

      ctx.drawImage(
        img,
        x - targetWidth / 2,
        y - targetHeight / 2,
        targetWidth,
        targetHeight
      );
    }

    // =====================================================
    // 状態
    // =====================================================

    let player = null;

    let bullets = [];
    let enemyBullets = [];
    let enemies = [];

    let boss = null;

    let keys = {};

    let stage = 1;
    let score = 0;

    let playing = false;
    let waiting = true;

    let shake = 0;

    let isTouching = false;

    // =====================================================
    // 音声システム（安定版）
    // =====================================================

    let audioCtx = null;

    let bgmStarted = false;

    let isUnlockingAudio = false;

    async function ensureAudioContext() {

      if (
        !audioCtx ||
        audioCtx.state === "closed"
      ) {

        audioCtx =
          new (
            window.AudioContext ||
            window.webkitAudioContext
          )({
            latencyHint: "interactive",
          });
      }

      if (isUnlockingAudio) return false;

      try {

        isUnlockingAudio = true;

        if (
          audioCtx.state === "suspended" ||
          audioCtx.state === "interrupted"
        ) {
          await audioCtx.resume();
        }

        // iOS unlock
        const buffer = audioCtx.createBuffer(
          1,
          1,
          22050
        );

        const source =
          audioCtx.createBufferSource();

        source.buffer = buffer;

        source.connect(audioCtx.destination);

        source.start(0);

        try {
          await silentAudio.play();
        } catch (e) { }

        return audioCtx.state === "running";

      } catch (e) {

        console.log(e);

        try {
          await audioCtx.close();
        } catch (e2) { }

        audioCtx = null;

        return false;

      } finally {

        isUnlockingAudio = false;
      }
    }

    async function playHitSound() {

      const ok = await ensureAudioContext();

      if (!ok) return;

      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();

      osc.type = "square";

      osc.frequency.setValueAtTime(
        150,
        audioCtx.currentTime
      );

      osc.frequency.exponentialRampToValueAtTime(
        40,
        audioCtx.currentTime + 0.1
      );

      gain.gain.setValueAtTime(
        0.15,
        audioCtx.currentTime
      );

      gain.gain.linearRampToValueAtTime(
        0,
        audioCtx.currentTime + 0.1
      );

      osc.connect(gain);
      gain.connect(audioCtx.destination);

      osc.start();

      osc.stop(audioCtx.currentTime + 0.1);
    }

    async function playDamageSound() {

      const ok = await ensureAudioContext();

      if (!ok) return;

      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();

      osc.type = "sawtooth";

      osc.frequency.setValueAtTime(
        100,
        audioCtx.currentTime
      );

      osc.frequency.exponentialRampToValueAtTime(
        20,
        audioCtx.currentTime + 0.3
      );

      gain.gain.setValueAtTime(
        0.2,
        audioCtx.currentTime
      );

      gain.gain.linearRampToValueAtTime(
        0,
        audioCtx.currentTime + 0.3
      );

      osc.connect(gain);
      gain.connect(audioCtx.destination);

      osc.start();

      osc.stop(audioCtx.currentTime + 0.3);
    }

    async function startBGM() {

      const ok = await ensureAudioContext();

      if (!ok) return;

      if (bgmStarted) return;

      bgmStarted = true;

      const notes = [
        196.0,
        220.0,
        261.63,
        293.66,
        329.63,
      ];

      let noteIdx = 0;

      function playNextNote() {

        if (!playing) {
          setTimeout(playNextNote, 1000);
          return;
        }

        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();

        osc.type = "triangle";

        osc.frequency.setValueAtTime(
          notes[noteIdx],
          audioCtx.currentTime
        );

        gain.gain.setValueAtTime(
          0,
          audioCtx.currentTime
        );

        gain.gain.linearRampToValueAtTime(
          0.08,
          audioCtx.currentTime + 0.1
        );

        gain.gain.exponentialRampToValueAtTime(
          0.001,
          audioCtx.currentTime + 1.2
        );

        osc.connect(gain);

        gain.connect(audioCtx.destination);

        osc.start();

        osc.stop(audioCtx.currentTime + 1.5);

        noteIdx =
          (noteIdx + 1) % notes.length;

        setTimeout(
          playNextNote,
          800 + Math.random() * 400
        );
      }

      playNextNote();
    }

    // =====================================================
    // iOS復帰対策
    // =====================================================

    document.addEventListener(
      "visibilitychange",
      async () => {

        if (
          document.visibilityState !== "visible"
        ) {
          return;
        }

        if (!audioCtx) return;

        try {

          if (
            audioCtx.state === "suspended" ||
            audioCtx.state === "interrupted"
          ) {
            await audioCtx.resume();
          }

        } catch (e) {

          try {
            await audioCtx.close();
          } catch (e2) { }

          audioCtx = null;
        }
      }
    );

    // =====================================================
    // ステージ
    // =====================================================

    function initStage() {

      player = {
        x: 200,
        y: 650,
        w: 40,
        h: 40,
        speed: 10,
        life: 5,
      };

      bullets = [];
      enemyBullets = [];
      enemies = [];

      for (let i = 0; i < 8; i++) {

        enemies.push({
          x: Math.random() * 340 + 30,
          y: 200 + Math.random() * 100,
          vx: (Math.random() - 0.5) * 3,
          vy: (Math.random() - 0.5) * 2,
        });
      }
    }

    function showStage() {

      initStage();

      playing = false;
      waiting = true;

      msgOverlay.style.display = "flex";

      msgContent.innerHTML = `
        STAGE ${stage}
        <br>
        <span>TAP or SPACEで開始</span>
      `;
    }

    // =====================================================
    // 開始
    // =====================================================

    async function onInteraction() {

      await ensureAudioContext();

      if (!playing && waiting) {

        waiting = false;
        playing = true;

        msgOverlay.style.display = "none";

        startBGM();
      }
    }

    // =====================================================
    // pointerup（超重要）
    // =====================================================

    msgOverlay.addEventListener(
      "pointerup",
      async (e) => {

        e.preventDefault();

        await onInteraction();
      }
    );

    // =====================================================
    // 入力
    // =====================================================

    window.addEventListener("keydown", (e) => {

      keys[e.code] = true;

      if (
        e.code === "Space" &&
        playing
      ) {
        bullets.push({
          x: player.x,
          y: player.y,
        });
      }
    });

    window.addEventListener("keyup", (e) => {
      keys[e.code] = false;
    });

    canvas.addEventListener(
      "pointerdown",
      (e) => {

        isTouching = true;

        const rect =
          canvas.getBoundingClientRect();

        player.targetX =
          (e.clientX - rect.left) *
          (canvas.width / rect.width);
      }
    );

    canvas.addEventListener(
      "pointermove",
      (e) => {

        if (!isTouching) return;

        const rect =
          canvas.getBoundingClientRect();

        player.targetX =
          (e.clientX - rect.left) *
          (canvas.width / rect.width);
      }
    );

    window.addEventListener(
      "pointerup",
      () => {

        isTouching = false;

        if (player) {
          player.targetX = undefined;
        }
      }
    );

    // =====================================================
    // update
    // =====================================================

    function update() {

      if (!playing) return;

      if (keys["ArrowLeft"]) {
        player.x -= player.speed;
      }

      if (keys["ArrowRight"]) {
        player.x += player.speed;
      }

      if (
        player.targetX !== undefined
      ) {
        player.x = player.targetX;
      }

      player.x = Math.max(
        20,
        Math.min(380, player.x)
      );

      if (
        isTouching &&
        Math.random() < 0.2
      ) {
        bullets.push({
          x: player.x,
          y: player.y,
        });
      }

      bullets.forEach((b) => {
        b.y -= 7;
      });

      bullets = bullets.filter(
        (b) => b.y > -50
      );

      enemies.forEach((e) => {

        e.x += e.vx;
        e.y += e.vy;

        if (e.x < 20 || e.x > 380) {
          e.vx *= -1;
        }

        if (e.y < 100 || e.y > 500) {
          e.vy *= -1;
        }

        if (Math.random() < 0.005) {

          const s =
            sushiAssets[
            Math.floor(
              Math.random() *
              sushiAssets.length
            )
            ];

          enemyBullets.push({
            x: e.x,
            y: e.y,
            img: s.img,
            pts: s.pts,
          });
        }
      });

      enemyBullets.forEach((b) => {
        b.y += 4;
      });

      enemyBullets =
        enemyBullets.filter(
          (b) => b.y < 850
        );

      bullets.forEach((b, bi) => {

        enemies.forEach((e, ei) => {

          if (
            Math.abs(b.x - e.x) < 40 &&
            Math.abs(b.y - e.y) < 40
          ) {

            enemies.splice(ei, 1);

            bullets.splice(bi, 1);

            score += 10;

            playHitSound();
          }
        });
      });

      enemyBullets.forEach((b, bi) => {

        if (
          Math.abs(b.x - player.x) < 35 &&
          Math.abs(b.y - player.y) < 35
        ) {

          enemyBullets.splice(bi, 1);

          player.life--;

          playDamageSound();

          if (player.life <= 0) {

            playing = false;

            msgOverlay.style.display =
              "flex";

            msgContent.innerHTML = `
              GAME OVER
              <br>
              <span>RELOADしてください</span>
            `;
          }
        }
      });
    }

    // =====================================================
    // draw
    // =====================================================

    function draw() {

      ctx.clearRect(
        0,
        0,
        canvas.width,
        canvas.height
      );

      ctx.drawImage(
        bgImg,
        0,
        0,
        400,
        800
      );

      if (player) {

        drawSprite(
          assets.bunny,
          player.x,
          player.y,
          100
        );

        bullets.forEach((b) => {

          drawSprite(
            assets.money,
            b.x,
            b.y,
            50
          );
        });
      }

      enemies.forEach((e) => {

        drawSprite(
          assets.chef,
          e.x,
          e.y,
          60
        );
      });

      enemyBullets.forEach((b) => {

        drawSprite(
          b.img,
          b.x,
          b.y,
          60
        );
      });

      ctx.fillStyle =
        "rgba(0,0,0,0.8)";

      ctx.fillRect(0, 0, 400, 70);

      ctx.fillStyle = "white";

      ctx.font =
        "20px 'MisakiGothic'";

      ctx.fillText(
        "SCORE: " + score,
        20,
        30
      );

      ctx.fillText(
        "LIFE: " + player.life,
        20,
        60
      );
    }

    // =====================================================
    // loop
    // =====================================================

    function loop() {

      update();

      draw();

      requestAnimationFrame(loop);
    }
  </script>
</body>

</html>
