<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <title>INVADER（やさしめ版）</title>
  <style>
    body {
      margin: 0;
      background: #111;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      font-family: sans-serif;
      overflow: hidden;
    }

    #game-container {
      position: relative;
      /* PCでは画面の高さの90%程度にする */
      height: 90vh;
      aspect-ratio: 1 / 2;
      background: #000;
      box-shadow: 0 0 50px rgba(0, 0, 0, 0.5);
      display: flex;
      justify-content: center;
      align-items: center;
    }

    canvas {
      width: 100%;
      height: 100%;
      display: block;
      touch-action: none;
    }

    /* スマホ（縦長画面）用の調整 */
    @media (max-width: 600px) {
      #game-container {
        width: 100vw;
        height: 100vh;
        max-width: none;
        max-height: none;
        aspect-ratio: auto;
        /* スマホでは画面いっぱいに */
      }
    }

    #msg {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: #fff;
      text-align: center;
      font-size: 28px;
      /* 小さく調整 */
      font-weight: 900;
      text-shadow: 0 0 10px rgba(0, 0, 0, 0.8), 0 0 20px rgba(0, 0, 0, 0.8);
      background: rgba(0, 0, 0, 0.7);
      padding: 15px 20px;
      border-radius: 10px;
      border: 2px solid #fff;
      pointer-events: none;
      z-index: 100;
      width: 90%;
      /* 横幅制限 */
      max-width: 360px;
      box-sizing: border-box;
      line-height: 1.2;
    }

    #msg span {
      display: block;
      font-size: 18px;
      margin-top: 10px;
      color: #ffcc00;
    }
  </style>
</head>

<body>

  <div id="game-container">
    <canvas id="game" width="400" height="800"></canvas>
    <div id="msg" class="screen"></div>
  </div>

  <script>
    const canvas = document.getElementById("game");
    const ctx = canvas.getContext("2d");

    const bgImg = new Image();
    bgImg.src = "bg.png";

    // アイコン（絵文字を使用）
    const emojis = {
      chef: "🧑‍🍳",
      sushi: "🍣",
      money: "💴",
      bunny: "👱‍♀️"
    };

    let player, bullets, enemyBullets, enemies, boss;
    let keys = {};
    let stage = 1, score = 0;
    let playing = false, waiting = true;
    let shake = 0;
    let isHiddenStage = false;
    let narrativeIdx = -1;
    const narrativeLines = [
      "思い出した…",
      "私は丸の内で働く会社員…",
      "こんなところでお鮨を食べている場合じゃなかった！"
    ];

    // サウンド設定 (Web Audio API)
    let audioCtx = null;
    let bgmOsc = null;

    function initAudio() {
      if (audioCtx) return;
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }

    function playHitSound() {
      if (!audioCtx) return;
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.type = "square";
      osc.frequency.setValueAtTime(150, audioCtx.currentTime);
      osc.frequency.exponentialRampToValueAtTime(40, audioCtx.currentTime + 0.1);
      gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
      gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.1);
      osc.connect(gain);
      gain.connect(audioCtx.destination);
      osc.start();
      osc.stop(audioCtx.currentTime + 0.1);
    }

    function playDamageSound() {
      if (!audioCtx) return;
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.type = "sawtooth";
      osc.frequency.setValueAtTime(100, audioCtx.currentTime);
      osc.frequency.exponentialRampToValueAtTime(20, audioCtx.currentTime + 0.3);
      gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
      gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.3);
      osc.connect(gain);
      gain.connect(audioCtx.destination);
      osc.start();
      osc.stop(audioCtx.currentTime + 0.3);
    }

    function startBGM() {
      if (!audioCtx || bgmOsc) return;
      bgmOsc = true; // 重複防止
      const notes = [196.00, 220.00, 261.63, 293.66, 329.63]; // 少し低めのペンタトニック
      let noteIdx = 0;

      function playNextNote() {
        if (!playing) {
          setTimeout(playNextNote, 1000);
          return;
        }
        
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        
        if (!isHiddenStage) {
          // --- お鮨屋：ゆったりした音 ---
          osc.type = "sine";
          osc.frequency.setValueAtTime(notes[noteIdx], audioCtx.currentTime);
          gain.gain.setValueAtTime(0, audioCtx.currentTime);
          gain.gain.linearRampToValueAtTime(0.02, audioCtx.currentTime + 0.1);
          gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 1.5);
          osc.connect(gain);
          gain.connect(audioCtx.destination);
          osc.start();
          osc.stop(audioCtx.currentTime + 2.0);
          noteIdx = (noteIdx + 1) % notes.length;
          setTimeout(playNextNote, 1200 + Math.random() * 800);
        } else {
          // --- オフィス：緊迫感のあるテクノ風 ---
          const tenseNotes = [110.00, 123.47, 130.81, 146.83]; // 低い A, B, C, D
          osc.type = "sawtooth";
          osc.frequency.setValueAtTime(tenseNotes[noteIdx % tenseNotes.length], audioCtx.currentTime);
          gain.gain.setValueAtTime(0.02, audioCtx.currentTime);
          gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.2);
          osc.connect(gain);
          gain.connect(audioCtx.destination);
          osc.start();
          osc.stop(audioCtx.currentTime + 0.2);
          noteIdx++;
          setTimeout(playNextNote, 150); // 高速テンポ
        }
      }
      playNextNote();
    }

    // 初期化
    function initStage() {
      if (stage === 1) {
        player = { x: 200, y: 600, w: 40, h: 40, speed: 10, life: 5, targetX: 200 };
        score = 0;
      }
      player.y = 600;
      player.x = 200;
      player.targetX = undefined;
      shake = 0;
      bullets = [];
      enemyBullets = [];
      enemies = [];
      boss = null;

      if (stage < 4) {
        const countMult = isHiddenStage ? 1.5 : 1;
        const speedMult = isHiddenStage ? 1.4 : 1;

        for (let i = 0; i < Math.floor((5 + stage * 2) * countMult); i++) {
          enemies.push({
            x: Math.random() * 340 + 30,
            y: 250 + Math.random() * 50, // テーブルの上部から開始
            vx: (Math.random() - 0.5) * (1 + stage * 0.3) * speedMult,
            vy: (Math.random() - 0.5) * (1 + stage * 0.3) * speedMult,
            downSpeed: (0.1 + stage * 0.05) * speedMult // 徐々に下がるスピード
          });
        }
      } else {
        const hp = isHiddenStage ? 60 : 30;
        boss = { x: 150, y: 240, w: 100, h: 100, vx: isHiddenStage ? 3 : 2, hp: hp, maxHp: hp };
      }
    }

    // 裏ステージへの移行
    function startHiddenStageTransition() {
      playing = false;
      narrativeIdx = 0;
      showNarrative();
    }

    function showNarrative() {
      const msgEl = document.getElementById("msg");
      msgEl.innerHTML = narrativeLines[narrativeIdx];
      msgEl.style.color = "white";
      msgEl.style.borderColor = "white";
      msgEl.style.display = "block";

      // 2秒後に自動で次へ
      setTimeout(nextNarrative, 2000);
    }

    function nextNarrative() {
      if (narrativeIdx === -1) return; // 既に終了している場合は無視
      narrativeIdx++;
      if (narrativeIdx < narrativeLines.length) {
        showNarrative();
      } else {
        narrativeIdx = -1;
        initHiddenStage();
      }
    }

    function initHiddenStage() {
      isHiddenStage = true;
      stage = 1; // 裏ステージ1から
      score = 0;

      // アイコン変更
      emojis.chef = "👨‍💼";
      emojis.sushi = "📃";
      emojis.money = "💻";
      emojis.bunny = "🧑‍💼";

      showStage();
    }

    // リトライ処理
    function handleRetry() {
      if (isHiddenStage) {
        initHiddenStage();
      } else {
        location.reload();
      }
    }

    // ステージ表示
    function showStage() {
      initStage();
      playing = false;
      waiting = true;

      // メッセージ更新
      const msgEl = document.getElementById("msg");
      if (stage < 4) {
        msgEl.innerHTML = `STAGE ${stage}<br><span>TAP or SPACEで開始</span>`;
        msgEl.style.color = "white";
      } else {
        msgEl.innerHTML = `FINAL STAGE<br><span>TAP or SPACEで最終決戦</span>`;
        msgEl.style.color = "#ff3300"; // ボス戦は赤
        msgEl.style.borderColor = "#ff3300";
      }
      msgEl.style.display = "block";
    }

    // 入力
    window.addEventListener("keydown", e => {
      keys[e.code] = true;
      initAudio(); // キー操作でも開始
      startBGM();
      player.targetX = undefined; // キー入力時はターゲット追従を解除

      // ナラティブ進行中は入力を受け付けない（またはスキップ不可にする）
      if (narrativeIdx >= 0) return;

      // ゲームオーバーまたはクリア時にRでリトライ
      if (!playing && e.code === "KeyR") {
        handleRetry();
      }
    });
    window.addEventListener("keyup", e => {
      if (e.code === "Space") {
        if (waiting) {
          waiting = false;
          playing = true;
          document.getElementById("msg").style.display = "none";
          return;
        }
        if (playing) {
          bullets.push({ x: player.x + 10, y: player.y });
        }
      }
      keys[e.code] = false;
    });

    // タッチ・クリック入力 (レスポンシブ対応)
    function handlePointer(e) {
      initAudio(); // ユーザー操作でオーディオ開始
      startBGM();

      if (narrativeIdx >= 0) return;

      if (!playing) {
        if (waiting) {
          waiting = false;
          playing = true;
          document.getElementById("msg").style.display = "none";
          return;
        } else {
          // ゲームオーバーまたはクリア画面でタップしたらリトライ
          handleRetry();
          return;
        }
      }

      const rect = canvas.getBoundingClientRect();
      const clientX = e.touches ? e.touches[0].clientX : e.clientX;
      const x = (clientX - rect.left) * (canvas.width / rect.width);

      player.targetX = x; // ターゲット位置へ移動

      // 自動射撃 (タッチ中)
      if (playing && Math.random() < 0.2) {
        bullets.push({ x: player.x + 10, y: player.y });
      }
    }

    canvas.addEventListener("touchstart", e => { e.preventDefault(); handlePointer(e); }, { passive: false });
    canvas.addEventListener("touchmove", e => { e.preventDefault(); handlePointer(e); }, { passive: false });
    canvas.addEventListener("mousedown", e => { handlePointer(e); });
    window.addEventListener("mousemove", e => { if (e.buttons === 1) handlePointer(e); });

    // ヒット
    function hit() {
      shake = 8;
    }

    // 更新
    function update() {

      bullets = bullets.filter(b => b.y > 0);
      enemyBullets = enemyBullets.filter(b => b.y < 800);

      // 振動の減衰は常に実行する
      if (shake > 0) shake *= 0.9;

      if (!playing) return;

      // 移動
      if (keys["ArrowLeft"]) player.x -= player.speed;
      if (keys["ArrowRight"]) player.x += player.speed;

      // タッチ・マウス追従 (瞬時に移動してレスポンスを良くする)
      if (player.targetX !== undefined) {
        player.x = player.targetX;
      }

      if (player.x < 0) player.x = 0;
      if (player.x > 400) player.x = 400;

      bullets.forEach(b => b.y -= 7);
      enemyBullets.forEach(b => b.y += 3);

      // 敵の独立したランダム移動 ＋ 下降
      enemies.forEach((e, ei) => {
        e.x += e.vx;
        e.y += e.vy + e.downSpeed;

        // 壁バウンド (テーブル内: X:20-380, Y:240-600)
        if (e.x < 20 || e.x > 380) e.vx *= -1;
        if (e.y < 240 || e.y > 600) e.vy *= -1;

        // たまに方向転換
        if (Math.random() < 0.02) {
          e.vx = (Math.random() - 0.5) * (1 + stage * 0.4);
          e.vy = (Math.random() - 0.5) * (1 + stage * 0.4);
        }

        // プレイヤーの位置を越えたらゲームオーバー (侵攻)
        if (e.y > 610) {
          playing = false;
          shake = 0;
          const msgEl = document.getElementById("msg");
          msgEl.innerHTML = "INVASION!<br>GAME OVER<br><span>TAP or R to RETRY</span>";
          msgEl.style.color = "#ff0000";
          msgEl.style.borderColor = "#ff0000";
          msgEl.style.display = "block";
        }

        // ショット (裏ステージはさらに頻度アップ)
        const shotProb = isHiddenStage ? 0.005 : 0.002;
        if (Math.random() < shotProb + stage * 0.001) {
          enemyBullets.push({ x: e.x, y: e.y + 10 });
        }
      });

      // ボス
      if (boss) {
        boss.x += boss.vx;
        if (boss.x < 0 || boss.x > 300) boss.vx *= -1;

        if (Math.random() < 0.015) {
          enemyBullets.push({ x: boss.x + 40, y: boss.y });
        }
      }

      // 自弾と敵の当たり判定
      bullets.forEach((b, bi) => {
        enemies.forEach((e, ei) => {
          if (b.x > e.x && b.x < e.x + 30 && b.y > e.y && b.y < e.y + 30) {
            enemies.splice(ei, 1);
            bullets.splice(bi, 1);
            score += 10;
            playHitSound(); // 当たり音
          }
        });

        if (boss && b.x > boss.x && b.x < boss.x + 80 && b.y > boss.y && b.y < boss.y + 80) {
          boss.hp -= 0.5;
          bullets.splice(bi, 1);
          score += 5;
          playHitSound(); // 当たり音
          shake = 10;
        }
      });

      // 被弾
      enemyBullets.forEach((b, bi) => {
        if (Math.abs(b.x - player.x) < 20 && Math.abs(b.y - player.y) < 20) {
          enemyBullets.splice(bi, 1);
          player.life--;
          playDamageSound(); // ダメージ音
          shake = 15;
          if (player.life <= 0) {
            playing = false;
            shake = 0; // 振動を止める
            const msgEl = document.getElementById("msg");
            msgEl.innerHTML = "GAME OVER<br><span>TAP or R to RETRY</span>";
            msgEl.style.color = "#ff0000";
            msgEl.style.borderColor = "#ff0000";
            msgEl.style.display = "block";
          }
        }
      });

      // ステージ進行
      if (enemies.length === 0 && !boss) {
        stage++;
        showStage();
      }

      // ⭐ エンディング変更 (裏ステージへの分岐)
      if (boss && boss.hp <= 0) {
        playing = false;
        shake = 0;
        if (!isHiddenStage) {
          startHiddenStageTransition();
        } else {
          const msgEl = document.getElementById("msg");
          msgEl.innerHTML = "ALL MISSIONS COMPLETE<br><span>仕事に戻ります…</span>";
          msgEl.style.color = "#00ffff";
          msgEl.style.borderColor = "#00ffff";
          msgEl.style.display = "block";
        }
      }
    }

    // 描画
    function draw() {
      ctx.save();

      if (shake > 0) {
        ctx.translate((Math.random() - 0.5) * shake, (Math.random() - 0.5) * shake);
      }

      ctx.clearRect(0, 0, 400, 800);

      if (!isHiddenStage) {
        // お鮨屋背景
        ctx.drawImage(bgImg, 0, 0, 1024, 350, 0, 40, 400, 200);
        ctx.drawImage(bgImg, 0, 350, 1024, 300, 0, 240, 400, 400);
        ctx.drawImage(bgImg, 0, 650, 1024, 374, 0, 640, 400, 200);
      } else {
        // --- プレミアム・オフィス背景 (プログラム描画) ---
        // 1. 床 (丸の内ブルー・カーペット)
        ctx.fillStyle = "#2c3e50";
        ctx.fillRect(0, 40, 400, 800);
        
        // グリッド模様 (タイル)
        ctx.strokeStyle = "rgba(255,255,255,0.05)";
        ctx.lineWidth = 1;
        for(let i=0; i<10; i++) {
          ctx.beginPath();
          ctx.moveTo(0, 40 + i*80); ctx.lineTo(400, 40 + i*80);
          ctx.stroke();
          ctx.beginPath();
          ctx.moveTo(i*40, 40); ctx.lineTo(i*40, 840);
          ctx.stroke();
        }

        // 2. 上部エリア (役員席・パーティション)
        ctx.fillStyle = "#34495e";
        ctx.fillRect(0, 40, 400, 200);
        ctx.fillStyle = "#1a252f";
        ctx.fillRect(0, 235, 400, 5); // 境界線
        
        // 役員 (ボス) のデスク風
        ctx.fillStyle = "#5d4037"; // 木目
        ctx.fillRect(100, 80, 200, 100);
        ctx.font = "60px serif";
        ctx.textAlign = "center";
        ctx.fillText("👨‍💼", 200, 140); // ラスボス（部長）
        ctx.textAlign = "left";

        // 3. 戦闘エリア (デスク島)
        const deskColor = "#95a5a6";
        const monitorColor = "#2c3e50";
        
        for (let row = 0; row < 3; row++) {
          let y = 280 + row * 130;
          // デスク
          ctx.fillStyle = deskColor;
          ctx.fillRect(30, y, 340, 60);
          ctx.fillStyle = "#7f8c8d";
          ctx.fillRect(30, y+55, 340, 5); // 影
          
          // モニターと書類
          for (let col = 0; col < 3; col++) {
            let x = 60 + col * 110;
            // モニター
            ctx.fillStyle = monitorColor;
            ctx.fillRect(x, y+10, 40, 30);
            ctx.fillStyle = "#34495e";
            ctx.fillRect(x+15, y+40, 10, 10); // スタンド
            // 書類
            ctx.fillStyle = "white";
            ctx.fillRect(x+50, y+20, 15, 20);
          }
        }
        
        // 4. 下部エリア (自分の席)
        ctx.fillStyle = "#34495e";
        ctx.fillRect(0, 660, 400, 140);
        ctx.fillStyle = "#5d4037";
        ctx.fillRect(50, 680, 300, 60); // 自分のデスク
      }

      ctx.globalAlpha = 1.0;

      // プレイヤー (👯‍♀️)
      ctx.textAlign = "center";
      ctx.font = "40px serif";
      ctx.fillText(emojis.bunny, player.x, player.y + 25);
      ctx.textAlign = "left";

      // 弾 (💴 札束)
      ctx.font = "20px serif";
      bullets.forEach(b => {
        ctx.fillText(emojis.money, b.x - 10, b.y + 10);
      });

      // 敵弾 (🍣 寿司)
      enemyBullets.forEach(b => {
        ctx.fillText(emojis.sushi, b.x - 10, b.y + 10);
      });

      // 敵 (🧑‍🍳 寿司職人)
      ctx.font = "30px serif";
      enemies.forEach(e => {
        ctx.fillText(emojis.chef, e.x - 5, e.y + 15);
      });

      // ボス
      if (boss) {
        ctx.font = "80px serif";
        ctx.fillText(emojis.chef, boss.x - 10, boss.y + 40);
      }

      // UI (上部の黒い帯を広げる)
      ctx.fillStyle = "rgba(0,0,0,0.85)";
      ctx.fillRect(0, 0, 400, 80);

      // ボスHPバー (黒帯の上に描画 - 横並びレイアウト)
      if (boss) {
        ctx.font = "bold 16px sans-serif";
        ctx.fillStyle = "#ffff00";
        ctx.textAlign = "left";
        ctx.fillText("BOSS HP", 10, 65);

        const barX = 100, barY = 52, barW = 290, barH = 16;
        // ゲージの背景
        ctx.fillStyle = "#444";
        ctx.fillRect(barX, barY, barW, barH);
        // 赤いゲージ
        ctx.fillStyle = "#ff2222";
        ctx.fillRect(barX, barY, barW * (boss.hp / boss.maxHp), barH);
        // 枠線
        ctx.strokeStyle = "white";
        ctx.lineWidth = 2;
        ctx.strokeRect(barX, barY, barW, barH);

        // 数値表示 (バーの上に重ねるか、右端に)
        ctx.font = "bold 12px sans-serif";
        ctx.fillStyle = "white";
        ctx.textAlign = "center";
        ctx.fillText(Math.ceil(boss.hp) + " / " + boss.maxHp, barX + barW / 2, barY + 12);
        ctx.textAlign = "left";
      }

      ctx.font = "bold 22px sans-serif";
      ctx.fillStyle = "white";
      ctx.shadowColor = "black";
      ctx.shadowBlur = 4;

      ctx.textAlign = "left";
      ctx.fillText("LIFE: ", 10, 32);
      ctx.fillText("❤️".repeat(player.life), 75, 32);

      ctx.textAlign = "right";
      ctx.fillText("SCORE: " + score, 390, 32);

      ctx.shadowBlur = 0; // シャドウ解除
      ctx.textAlign = "left";

      ctx.restore();
    }

    // ループ
    function loop() {
      update();
      draw();
      requestAnimationFrame(loop);
    }

    // 初期
    showStage();
    loop();
  </script>

</body>

</html>
