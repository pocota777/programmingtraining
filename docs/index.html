<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>SUSHIVADER</title>

  <style>
    @font-face {
      font-family: 'MisakiGothic';
      src: url('https://cdn.leafscape.be/misaki/misaki_gothic_web.woff2') format('woff2');
    }

    body {
      margin: 0;
      background: #111;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      font-family: 'MisakiGothic', sans-serif;
      overflow: hidden;
      touch-action: none;
    }

    #game-container {
      position: relative;
      height: 90vh;
      aspect-ratio: 1 / 2;
      background: #000;
      box-shadow: 0 0 50px rgba(0, 0, 0, 0.5);
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
    }

    canvas {
      width: 100%;
      height: 100%;
      display: block;
    }

    @media (max-width: 600px) {
      #game-container {
        width: 100vw;
        height: 100vh;
        max-width: none;
        max-height: none;
        aspect-ratio: auto;
      }
    }

    #msg-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      background: rgba(0, 0, 0, 0.5);
      z-index: 100;
      cursor: pointer;
    }

    #msg-content {
      color: #fff;
      text-align: center;
      font-size: 28px;
      text-shadow: 0 0 10px #000, 0 0 20px #000;
      background: rgba(0, 0, 0, 0.85);
      padding: 20px;
      border: 4px solid #fff;
      border-radius: 10px;
      width: 80%;
      max-width: 320px;
      pointer-events: auto;
    }

    #msg-content span {
      display: block;
      font-size: 18px;
      margin-top: 15px;
      color: #ffcc00;
    }

    #loading-screen {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: #000;
      color: #fff;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 1000;
    }

    .loading-bar-container {
      width: 60%;
      height: 20px;
      border: 3px solid #fff;
      padding: 3px;
    }

    #loading-bar {
      width: 0%;
      height: 100%;
      background: #00ffff;
    }
  </style>
</head>

<body>

  <div id="game-container">
    <div id="loading-screen">
      <h2>LOADING...</h2>
      <div class="loading-bar-container">
        <div id="loading-bar"></div>
      </div>
      <div id="loading-text">0%</div>
    </div>

    <div id="msg-overlay" style="display: none;">
      <div id="msg-content"></div>
    </div>

    <canvas id="game" width="400" height="800"></canvas>
  </div>

  <audio id="silent-audio" preload="auto">
    <source src="data:audio/mpeg;base64,SUQzBAAAAAABAFRYWFgAAAASAAADbWFqb3JfYnJhbmQAbXA0MgBUWFhYAAAAEgAAA21pbm9yX3ZlcnNpb24AMABUWFhYAAAAHAAAA2NvbXBhdGlibGVfYnJhbmRzAGlzb21tcDQyAFRTU0UAAAAPAAADYmFzZWxpbmUAbXA0MgAA/+7fAAAAAAAAAAAAAAA=" type="audio/mpeg">
  </audio>

  <script>
    const canvas = document.getElementById("game");
    const ctx = canvas.getContext("2d");
    const msgOverlay = document.getElementById("msg-overlay");
    const msgContent = document.getElementById("msg-content");
    const silentAudio = document.getElementById("silent-audio");

    const bgImg = new Image();
    const officeBgImg = new Image();
    const assets = {
      chef: new Image(), money: new Image(), bunny: new Image(),
      boss: new Image(), paper: new Image(), pc: new Image(),
      woman2: new Image(), life: new Image()
    };
    const sushiAssets = [
      { img: new Image(), pts: 10, src: "egg.png" },
      { img: new Image(), pts: 20, src: "tuna.png" },
      { img: new Image(), pts: 30, src: "salmon.png" },
      { img: new Image(), pts: 40, src: "ikura.png" },
      { img: new Image(), pts: 50, src: "uni.png" }
    ];

    function loadAssets() {
      const allImages = [
        { img: bgImg, src: "images/sushibg.jpg" },
        { img: officeBgImg, src: "images/officebg.jpg" },
        { img: assets.chef, src: "images/itamae.png" },
        { img: assets.money, src: "images/money.png" },
        { img: assets.bunny, src: "images/woman1.png" },
        { img: assets.boss, src: "images/boss.png" },
        { img: assets.paper, src: "images/paper.png" },
        { img: assets.pc, src: "images/pc.png" },
        { img: assets.woman2, src: "images/woman2.png" },
        { img: assets.life, src: "images/life.png" },
        ...sushiAssets
      ];
      let loaded = 0;
      allImages.forEach(item => {
        item.img.onload = item.img.onerror = () => {
          loaded++;
          const percent = Math.floor((loaded / allImages.length) * 100);
          const bar = document.getElementById("loading-bar");
          const text = document.getElementById("loading-text");
          if (bar) bar.style.width = percent + "%";
          if (text) text.innerText = percent + "%";
          if (loaded === allImages.length) {
            setTimeout(() => {
              document.getElementById("loading-screen").style.display = "none";
              showStage();
              loop();
            }, 500);
          }
        };
        item.img.src = item.src.includes("/") ? item.src : "images/" + item.src;
      });
    }
    loadAssets();

    function drawSprite(img, x, y, targetWidth) {
      if (!img.complete || !img.naturalWidth) return;
      const ratio = img.naturalHeight / img.naturalWidth;
      const targetHeight = targetWidth * ratio;
      ctx.drawImage(img, x - targetWidth / 2, y - targetHeight / 2, targetWidth, targetHeight);
    }

    let player = null, bullets = [], enemyBullets = [], enemies = [], boss = null;
    let keys = {}, stage = 1, score = 0, playing = false, waiting = true, shake = 0;
    let isHiddenStage = false, isGameClear = false, canRetry = true, narrativeIdx = -1;
    let isTouching = false; // 連射のためのタッチフラグ
    const narrativeLines = ["思い出した…", "私は丸の内で働く会社員…", "こんなところでお鮨を食べている場合じゃなかった！"];

    // --- 音声システム ---
    let audioCtx = null, bgmOsc = null;

    function unlockAudio() {
      try {
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        if (audioCtx.state === 'suspended') audioCtx.resume();
        silentAudio.play().catch(() => {});
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        gain.gain.value = 0.001;
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.start(0);
        osc.stop(audioCtx.currentTime + 0.1);
      } catch (e) { console.error(e); }
    }

    function playHitSound() {
      if (!audioCtx) return;
      if (audioCtx.state === 'suspended') audioCtx.resume();
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.type = "square";
      osc.frequency.setValueAtTime(150, audioCtx.currentTime);
      osc.frequency.exponentialRampToValueAtTime(40, audioCtx.currentTime + 0.1);
      gain.gain.setValueAtTime(0.15, audioCtx.currentTime);
      gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.1);
      osc.connect(gain); gain.connect(audioCtx.destination);
      osc.start(); osc.stop(audioCtx.currentTime + 0.1);
    }

    function playDamageSound() {
      if (!audioCtx) return;
      if (audioCtx.state === 'suspended') audioCtx.resume();
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.type = "sawtooth";
      osc.frequency.setValueAtTime(100, audioCtx.currentTime);
      osc.frequency.exponentialRampToValueAtTime(20, audioCtx.currentTime + 0.3);
      gain.gain.setValueAtTime(0.25, audioCtx.currentTime);
      gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.3);
      osc.connect(gain); gain.connect(audioCtx.destination);
      osc.start(); osc.stop(audioCtx.currentTime + 0.3);
    }

    function startBGM() {
      if (!audioCtx || bgmOsc) return;
      bgmOsc = true;
      const notes = [196.00, 220.00, 261.63, 293.66, 329.63];
      let noteIdx = 0;
      function playNextNote() {
        if (!playing) { setTimeout(playNextNote, 1000); return; }
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        if (!isHiddenStage) {
          osc.type = "triangle";
          osc.frequency.setValueAtTime(notes[noteIdx], audioCtx.currentTime);
          gain.gain.setValueAtTime(0, audioCtx.currentTime);
          gain.gain.linearRampToValueAtTime(0.08, audioCtx.currentTime + 0.1);
          gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 1.2);
          osc.connect(gain); gain.connect(audioCtx.destination);
          osc.start(); osc.stop(audioCtx.currentTime + 1.5);
          noteIdx = (noteIdx + 1) % notes.length;
          setTimeout(playNextNote, 800 + Math.random() * 400);
        } else {
          const tenseNotes = [110.00, 123.47, 130.81, 146.83];
          osc.type = "sawtooth";
          osc.frequency.setValueAtTime(tenseNotes[noteIdx % tenseNotes.length], audioCtx.currentTime);
          gain.gain.setValueAtTime(0.04, audioCtx.currentTime);
          gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.2);
          osc.connect(gain); gain.connect(audioCtx.destination);
          osc.start(); osc.stop(audioCtx.currentTime + 0.2);
          noteIdx++;
          setTimeout(playNextNote, 150);
        }
      }
      playNextNote();
    }

    // --- ロジック ---
    function initStage() {
      if (stage === 1) {
        player = { x: 200, y: 600, w: 40, h: 40, speed: 10, life: 5, targetX: 200 };
        score = 0;
      }
      player.y = 600; player.x = 200; player.targetX = undefined;
      shake = 0; bullets = []; enemyBullets = []; enemies = []; boss = null;
      if (stage < 4) {
        const countMult = isHiddenStage ? 1.5 : 1;
        const speedMult = isHiddenStage ? 1.4 : 1;
        for (let i = 0; i < Math.floor((5 + stage * 2) * countMult); i++) {
          enemies.push({
            x: Math.random() * 340 + 30, y: 250 + Math.random() * 50,
            vx: (Math.random() - 0.5) * (1 + stage * 0.3) * speedMult,
            vy: (Math.random() - 0.5) * (1 + stage * 0.3) * speedMult,
            downSpeed: (0.1 + stage * 0.05) * speedMult
          });
        }
      } else {
        const hp = isHiddenStage ? 60 : 30;
        boss = { x: 150, y: 240, w: 100, h: 100, vx: isHiddenStage ? 3 : 2, hp: hp, maxHp: hp };
      }
    }

    function showStage() {
      initStage(); playing = false; waiting = true;
      msgOverlay.style.display = "flex";
      if (stage < 4) {
        msgContent.innerHTML = `STAGE ${stage}<br><span>TAP or SPACEで開始</span>`;
        msgContent.style.color = "#fff"; msgContent.style.borderColor = "#fff";
      } else {
        msgContent.innerHTML = `FINAL STAGE<br><span>TAP or SPACEで最終決戦</span>`;
        msgContent.style.color = "#ff3300"; msgContent.style.borderColor = "#ff3300";
      }
    }

    function startHiddenStageTransition() {
      playing = false; narrativeIdx = 0; showNarrative();
    }

    function showNarrative() {
      msgOverlay.style.display = "flex";
      msgContent.innerHTML = narrativeLines[narrativeIdx];
      msgContent.style.color = "#fff"; msgContent.style.borderColor = "#fff";
      setTimeout(nextNarrative, 2000);
    }

    function nextNarrative() {
      if (narrativeIdx === -1) return;
      narrativeIdx++;
      if (narrativeIdx < narrativeLines.length) showNarrative();
      else { narrativeIdx = -1; isHiddenStage = true; stage = 1; score = 0; showStage(); }
    }

    function handleRetry() {
      if (!canRetry) return;
      location.reload();
    }

    function onInteraction(isTouch) {
      unlockAudio();
      startBGM();
      if (isTouch) isTouching = true; // タッチの時だけ連射を即座に有効にする
      if (narrativeIdx >= 0) return;
      if (!playing) {
        if (waiting) {
          waiting = false; playing = true;
          msgOverlay.style.display = "none";
        } else {
          handleRetry();
        }
      }
    }

    msgOverlay.addEventListener("click", () => onInteraction(false));
    msgOverlay.addEventListener("touchstart", (e) => {
      e.preventDefault();
      const rect = canvas.getBoundingClientRect();
      if (player) {
        player.targetX = (e.touches[0].clientX - rect.left) * (canvas.width / rect.width);
      }
      onInteraction(true);
    }, { passive: false });
    msgOverlay.addEventListener("touchend", () => { isTouching = false; });
    window.addEventListener("mouseup", () => { isTouching = false; });

    window.addEventListener("keydown", e => {
      keys[e.code] = true;
      onInteraction();
      if (e.code === "Space" && playing) bullets.push({ x: player.x + 10, y: player.y });
    });
    window.addEventListener("keyup", e => { keys[e.code] = false; });

    canvas.addEventListener("mousedown", e => {
      isTouching = true;
      const rect = canvas.getBoundingClientRect();
      player.targetX = (e.clientX - rect.left) * (canvas.width / rect.width);
    });

    canvas.addEventListener("touchstart", e => {
      e.preventDefault();
      isTouching = true;
      const rect = canvas.getBoundingClientRect();
      player.targetX = (e.touches[0].clientX - rect.left) * (canvas.width / rect.width);
    }, { passive: false });

    canvas.addEventListener("touchmove", e => {
      e.preventDefault();
      const rect = canvas.getBoundingClientRect();
      player.targetX = (e.touches[0].clientX - rect.left) * (canvas.width / rect.width);
    }, { passive: false });

    canvas.addEventListener("touchend", e => {
      e.preventDefault();
      isTouching = false;
      player.targetX = undefined;
    }, { passive: false });

    function update() {
      bullets = bullets.filter(b => b.y > -50);
      enemyBullets = enemyBullets.filter(b => b.y < 850);
      if (shake > 0) shake *= 0.9;
      if (!playing) return;

      // 自動連射 (タッチ中)
      if (isTouching && Math.random() < 0.2) {
        bullets.push({ x: player.x + 10, y: player.y });
      }

      if (keys["ArrowLeft"]) player.x -= player.speed;
      if (keys["ArrowRight"]) player.x += player.speed;
      if (player.targetX !== undefined) player.x = player.targetX;
      if (player.x < 0) player.x = 0; if (player.x > 400) player.x = 400;

      bullets.forEach(b => b.y -= 7);
      enemyBullets.forEach(b => b.y += 1.8);

      enemies.forEach((e, ei) => {
        e.x += e.vx; e.y += e.vy + e.downSpeed;
        if (e.x < 20 || e.x > 380) e.vx *= -1;
        if (e.y < 240 || e.y > 600) e.vy *= -1;
        if (Math.random() < 0.02) {
          e.vx = (Math.random() - 0.5) * (1 + stage * 0.4);
          e.vy = (Math.random() - 0.5) * (1 + stage * 0.4);
        }
        if (e.y > 610) {
          playing = false; msgOverlay.style.display = "flex";
          msgContent.innerHTML = "INVASION!<br>GAME OVER<br><span>TAP or R to RETRY</span>";
          msgContent.style.color = "#ff0000"; msgContent.style.borderColor = "#ff0000";
        }
        const shotProb = isHiddenStage ? 0.001 : 0.0005;
        if (Math.random() < shotProb + stage * 0.0002) {
          const s = !isHiddenStage ? sushiAssets[Math.floor(Math.random() * sushiAssets.length)] : { img: assets.paper, pts: 10 };
          enemyBullets.push({ x: e.x, y: e.y + 10, img: s.img, pts: s.pts });
        }
      });

      if (boss) {
        boss.x += boss.vx; if (boss.x < 0 || boss.x > 300) boss.vx *= -1;
        if (Math.random() < 0.005) {
          const s = !isHiddenStage ? sushiAssets[Math.floor(Math.random() * sushiAssets.length)] : { img: assets.paper, pts: 10 };
          enemyBullets.push({ x: boss.x + 40, y: boss.y, img: s.img, pts: s.pts });
        }
      }

      bullets.forEach((b, bi) => {
        enemies.forEach((e, ei) => {
          if (Math.abs(b.x - e.x) < 40 && Math.abs(b.y - e.y) < 40) {
            enemies.splice(ei, 1); bullets.splice(bi, 1); score += 10; playHitSound();
          }
        });
        enemyBullets.forEach((eb, ebi) => {
          if (Math.abs(b.x - eb.x) < 30 && Math.abs(b.y - eb.y) < 30) {
            score += eb.pts; bullets.splice(bi, 1); playHitSound();
          }
        });
        if (boss && b.x > boss.x && b.x < boss.x + boss.w && b.y > boss.y && b.y < boss.y + boss.h) {
          boss.hp -= 0.5; bullets.splice(bi, 1); score += 5; playHitSound(); shake = 10;
        }
      });

      enemyBullets.forEach((b, bi) => {
        if (Math.abs(b.x - player.x) < 35 && Math.abs(b.y - player.y) < 35) {
          enemyBullets.splice(bi, 1); player.life--; playDamageSound(); shake = 15;
          if (player.life <= 0) {
            playing = false; msgOverlay.style.display = "flex";
            msgContent.innerHTML = "GAME OVER<br><span>TAP or R to RETRY</span>";
            msgContent.style.color = "#ff0000"; msgContent.style.borderColor = "#ff0000";
          }
        }
      });

      if (enemies.length === 0 && !boss) { stage++; showStage(); }
      if (boss && boss.hp <= 0) {
        playing = false;
        if (!isHiddenStage) startHiddenStageTransition();
        else {
          isGameClear = true; canRetry = false; msgOverlay.style.display = "flex";
          msgContent.innerHTML = "ALL MISSIONS COMPLETE<br><span>仕事に戻ります…</span>";
          msgContent.style.color = "#00ffff"; msgContent.style.borderColor = "#00ffff";
          setTimeout(() => { canRetry = true; msgContent.innerHTML = "ALL MISSIONS COMPLETE<br><span>RETRY TAP or R</span>"; }, 5000);
        }
      }
    }

    function draw() {
      ctx.save();
      if (shake > 0) ctx.translate((Math.random() - 0.5) * shake, (Math.random() - 0.5) * shake);
      ctx.clearRect(0, 0, 400, 800);
      if (!isHiddenStage) ctx.drawImage(bgImg, 0, 0, 400, 800);
      else ctx.drawImage(officeBgImg, 0, 0, 400, 800);
      ctx.globalAlpha = 1.0;
      if (player) {
        const pImg = isHiddenStage ? assets.woman2 : assets.bunny;
        drawSprite(pImg, player.x, player.y, 100);
        const bImg = isHiddenStage ? assets.pc : assets.money;
        bullets.forEach(b => drawSprite(bImg, b.x, b.y, 50));
      }
      enemyBullets.forEach(b => { if (b.img) drawSprite(b.img, b.x, b.y, 60); });
      const eImg = isHiddenStage ? assets.boss : assets.chef;
      enemies.forEach(e => drawSprite(eImg, e.x, e.y, 60));
      if (boss) drawSprite(eImg, boss.x + boss.w / 2, boss.y + boss.h / 2, 150);
      ctx.fillStyle = "rgba(0,0,0,0.85)"; ctx.fillRect(0, 0, 400, 80);
      if (player) {
        ctx.textAlign = "left"; ctx.font = "20px 'MisakiGothic'"; ctx.fillStyle = "white";
        ctx.fillText("LIFE: ", 10, 32);
        for (let i = 0; i < player.life; i++) drawSprite(assets.life, 85 + i * 25, 25, 30);
      }
      ctx.textAlign = "right"; ctx.font = "20px 'MisakiGothic'"; ctx.fillStyle = "white";
      ctx.fillText("SCORE: " + score, 390, 32);
      if (boss) {
        ctx.font = "16px 'MisakiGothic'"; ctx.fillStyle = "#ffff00"; ctx.textAlign = "left"; ctx.fillText("BOSS HP", 10, 65);
        const barX = 100, barY = 52, barW = 290, barH = 16;
        ctx.fillStyle = "#444"; ctx.fillRect(barX, barY, barW, barH);
        ctx.fillStyle = "#ff2222"; ctx.fillRect(barX, barY, barW * (boss.hp / boss.maxHp), barH);
        ctx.strokeStyle = "white"; ctx.lineWidth = 2; ctx.strokeRect(barX, barY, barW, barH);
        ctx.font = "12px 'MisakiGothic'"; ctx.fillStyle = "white"; ctx.textAlign = "center";
        ctx.fillText(Math.ceil(boss.hp) + " / " + boss.maxHp, barX + barW / 2, barY + 12);
      }
      ctx.restore();
    }

    function loop() { update(); draw(); requestAnimationFrame(loop); }
  </script>
</body>
</html>
